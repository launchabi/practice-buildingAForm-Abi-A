<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Building a form</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <section>
      <form action="/next" method="post">
        <fieldset>
          <legend>Contact Information</legend>
          <label for="name">Username</label>
          <input type="text" id="fullname" placeholder="Enter Username" required />

          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@example.com"
            required
          />

          <label for="password">Password</label>
          <input type="password" placeholder="Enter Password" required />
        </fieldset>
        

        <fieldset>
          <legend>Feedback Categories</legend>
          <label for="Too Short">
            <input type="checkbox" id="feedback" />Too Short
          </label>

          <label for="Too Long">
            <input type="checkbox" id="feedback" />Too Long
          </label>

          <label for="Not Enough Information">
            <input type="checkbox" id="no-info" />Not Enough Information
          </label>
        </fieldset>

        <fieldset>
          <legend>Preferred Contact Method</legend>
          <label for="email-contact">
            <input
              type="radio"
              id="email-contact"
              name="contact"
              value="email"
              checked
            />
            Email
          </label>
          <label for="phone-contact">
            <input
              type="radio"
              id="phone-contact"
              name="contact"
              value="phone"
            />
            Phone
          </label>
        </fieldset>

        <fieldset>
            <legend>Additional Features of Interest</legend>
            <label for="bg-color">
                <input type="radio" checked>Add Background Color
            </label>

            <label for="graphics">
                <input type="radio">Add better graphics
            </label>
        </fieldset>

        <div>
            <label for="comments">Comments</label>
            <textarea name="comments" id="comments" placeholder="Add your comments here"></textarea>
        </div>

        <input type="submit" value="submit" class="small-button">
      </form>
    </section>
  </body>
</html>
